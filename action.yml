name: "DEPBADGE"
author: "Eugen Hildt"
description: >
  Generates Shields.io-compatible badges from your project manifest using
  `depbadgerc.yml`, injects them into `README.md`, and outputs structured
  files under `.depbadge`.

runs:
  using: "node24"
  main: "dist/index.js"

branding:
  icon: "tag"
  color: "purple"

inputs:
  config-file:
    description: "Path to depbadgerc.yml in the project root"
    required: true
    default: "depbadgerc.yml"
  readme:
    description: "Path to README.md in the project root"
    required: true
    default: "README.md"

outputs:
  badges-json:
    description: "Path to the `.depbadge` folder containing badge.json files and preview"
  badges-readme:
    description: "Path to the updated README.md"