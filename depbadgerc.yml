integrity: da069826f912f63bc20bc5cc9d20a83c4c1696b91eb0897336543a93f18144fb
target: README.md
manifest: package.json
output: ['json', 'markdown']

dependenciesLayout: &DEPENDENCIES_LAYOUT
  position: center
  showHeader: false
  theme: dark

devDependenciesLayout: &DEV_DEPENDENCIES_LAYOUT
  <<: *DEPENDENCIES_LAYOUT
  position: left
  showHeader: false
  header: my-new-header-name

peerDependenciesLayout: &PEER_DEPENDENCIES_LAYOUT
  <<: *DEPENDENCIES_LAYOUT
  position: right
  showHeader: false
  theme: white

statusBadgesLayout: &STATUS_BADGES_LAYOUT
  position: center
  showHeader: true
  theme: dark

dependenciesStyle: &DEPENDENCIES_STYLE
  # color: '#222'
  labelColor: '#333'
  isError: false
  namedLogo: npm
  logoSvg: ''
  # logoColor: "#777"
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600
  link: https://www.npmjs.com/package/example_package

devDependenciesStyle: &DEV_DEPENDENCIES_STYLE
  <<: *DEPENDENCIES_STYLE
  # labelColor: '#333'
  # color: '#222'
  style: flat-square

peerDependenciesStyle: &PEER_DEPENDENCIES_STYLE
  <<: *DEPENDENCIES_STYLE
  labelColor: '#333'
  style: flat

statusBadgesStyle: &STATUS_BADGES_STYLE   
  labelColor: '#bbb'
  isError: false
  namedLogo: 'npm'
  logoSvg: ''
  color: white
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600
  link: 'https://something.com'

dependencies:
  layout:
    <<: *DEPENDENCIES_LAYOUT
  badgeStyle: *DEPENDENCIES_STYLE
  items:
    - name: chalk
      namedLogo: chalk
    - name: colord
      namedLogo: colord
    - name: js-yaml
      namedLogo: js

devDependencies:
  layout:
    <<: *DEV_DEPENDENCIES_LAYOUT
    position: center
  badgeStyle: *DEV_DEPENDENCIES_STYLE
  items:
    - name: '@changesets/cli'
      namedLogo: npm
    - name: '@eslint/js'
      namedLogo: eslint
    - name: '@types/eslint'
      namedLogo: eslint
    - name: '@types/jest'
      namedLogo: jest
    - name: '@types/node'
      namedLogo: node
    - name: '@types/supertest'
      namedLogo: npm
    - name: depcheck
      namedLogo: npm
    - name: dependency-cruiser
      namedLogo: npm
    - name: dotenv-cli
      namedLogo: npm
    - name: eslint
      namedLogo: eslint
    - name: eslint-config-prettier
      namedLogo: prettier
    - name: eslint-plugin-prettier
      namedLogo: prettier
    - name: eslint-plugin-simple-import-sort
      namedLogo: npm
    - name: eslint-plugin-sonarjs
      namedLogo: sonar
    - name: globals
      namedLogo: npm
    - name: husky
      namedLogo: husky
    - name: jest
      namedLogo: jest
    - name: jest-extended
      namedLogo: jest
    - name: jest-junit
      namedLogo: jest
    - name: jiti
      namedLogo: npm
    - name: lint-staged
      namedLogo: npm
    - name: npm-check-updates
      namedLogo: npm
    - name: rimraf
      namedLogo: npm
    - name: source-map-support
      namedLogo: npm
    - name: supertest
      namedLogo: npm
    - name: ts-jest
      namedLogo: jest
    - name: ts-loader
      namedLogo: npm
    - name: ts-node
      namedLogo: npm
    - name: ts-unused-exports
      namedLogo: npm
    - name: typescript
      namedLogo: typescript
    - name: typescript-eslint
      namedLogo: eslint

peerDependencies:
  layout:
    <<: *PEER_DEPENDENCIES_LAYOUT
    theme: 'white'
  badgeStyle: *PEER_DEPENDENCIES_STYLE
  items:
    - name: react
      namedLogo: react

