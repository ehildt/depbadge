integrity: f5bc9594027b09da74630a977cf5bd550cf157c34aa84f835efe3f1acf2c5ad4
target: README.md
manifest: package.json
output: ['json', 'markdown']

dependenciesLayout: &DEPENDENCIES_LAYOUT
  position: center
  showHeader: false
  theme: dark

devDependenciesLayout: &DEV_DEPENDENCIES_LAYOUT
  <<: *DEPENDENCIES_LAYOUT
  position: left
  showHeader: false
  header: my-new-header-name

peerDependenciesLayout: &PEER_DEPENDENCIES_LAYOUT
  <<: *DEPENDENCIES_LAYOUT
  position: right
  showHeader: false
  theme: white

statusBadgesLayout: &STATUS_BADGES_LAYOUT
  position: center
  showHeader: true
  theme: dark

dependenciesStyle: &DEPENDENCIES_STYLE
  # color: '#222'
  labelColor: '#333'
  isError: false
  namedLogo: npm
  logoSvg: ''
  # logoColor: "#777"
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600
  link: https://www.npmjs.com/package/example_package

devDependenciesStyle: &DEV_DEPENDENCIES_STYLE
  <<: *DEPENDENCIES_STYLE
  # labelColor: '#333'
  # color: '#222'
  style: flat-square

peerDependenciesStyle: &PEER_DEPENDENCIES_STYLE
  <<: *DEPENDENCIES_STYLE
  labelColor: '#333'
  style: flat

statusBadgesStyle: &STATUS_BADGES_STYLE   
  labelColor: '#333'
  isError: false
  namedLogo: 'npm'
  logoSvg: ''
  #color: white
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600
  link: 'https://something.com'

